site_name: sdd-tui
site_description: <!-- sdd-docs:placeholder type="description" description="2-3 sentence overview of the project for end users" -->

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Reference:
    - Core: reference/core.md
    - Distribution: reference/distribution.md
    - Docs: reference/docs.md
    - Github: reference/github.md
    - Providers: reference/providers.md
    - Tests: reference/tests.md
    - Tooling: reference/tooling.md
    - Tui: reference/tui.md
  - Changelog: changelog.md
